<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Statuses — Design Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#005eb8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nhsuk-frontend@10.5.2/dist/nhsuk/nhsuk-frontend.min.css" />
    <style>
      .nhsuk-width-container { max-width: 1680px; padding-left: 32px !important; padding-right: 32px !important; }
      .status-list { list-style: none; padding: 0; margin: 0 0 24px; }
      .status-row { display: flex; align-items: center; gap: 16px; padding: 12px 16px; background: #fff; border: 1px solid #d8dde0; margin-bottom: 8px; }
      .status-row:hover { border-color: #005eb8; }
      .status-row.drag-over { border: 2px dashed #005eb8; background: #d8edff; }
      .status-row.dragging  { opacity: 0.35; }
      .drag-handle { cursor: grab; color: #768692; font-size: 20px; flex-shrink: 0; }
      .drag-handle:active { cursor: grabbing; }
      .status-actions { margin-left: auto; display: flex; gap: 8px; }
      .inline-form { background: #f0f4f5; padding: 24px; margin-bottom: 24px; }
      .colour-preview { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    </style>
  </head>
  <body>
    <script>
      document.body.className += ' js-enabled' + ('noModule' in HTMLScriptElement.prototype ? ' nhsuk-frontend-supported' : '');
    </script>
    <a class="nhsuk-skip-link" data-module="nhsuk-skip-link" href="#maincontent">Skip to main content</a>
    <div id="site-nav"></div>

    <div class="nhsuk-width-container">
      <main class="nhsuk-main-wrapper" id="maincontent">
        <div class="nhsuk-grid-row">
          <div class="nhsuk-grid-column-two-thirds">

            <h1 class="nhsuk-heading-xl">Statuses</h1>
            <p class="nhsuk-body">Statuses are global and apply to all projects. Drag to reorder.</p>

            <!-- Add / edit form -->
            <details class="nhsuk-details nhsuk-expander" id="status-expander">
              <summary class="nhsuk-details__summary">
                <span class="nhsuk-details__summary-text" id="form-heading">Add status</span>
              </summary>
              <div class="nhsuk-details__text">
                <form id="status-form" novalidate>
                  <input type="hidden" id="f-id" />
                  <div class="nhsuk-form-group">
                    <label class="nhsuk-label nhsuk-label--s" for="f-name">Name <span aria-hidden="true" style="color:#d5281b">*</span></label>
                    <input class="nhsuk-input nhsuk-input--width-20" id="f-name" type="text" autocomplete="off" />
                  </div>
                  <div class="nhsuk-form-group">
                    <label class="nhsuk-label nhsuk-label--s" for="f-colour">Colour</label>
                    <select class="nhsuk-select" id="f-colour"></select>
                  </div>
                  <div class="nhsuk-button-group">
                    <button type="submit" class="nhsuk-button nhsuk-button--small">Save status</button>
                    <button type="button" class="nhsuk-button nhsuk-button--secondary nhsuk-button--small" onclick="cancelEdit()">Cancel</button>
                    <button type="button" id="delete-btn" class="nhsuk-button nhsuk-button--warning nhsuk-button--small" style="display:none;margin-left:auto" onclick="deleteStatus()">Delete</button>
                  </div>
                </form>
              </div>
            </details>

            <!-- Status list -->
            <ul class="status-list" id="status-list"></ul>

          </div>
        </div>
      </main>
    </div>

    <footer class="nhsuk-footer" role="contentinfo">
      <div class="nhsuk-width-container">
        <div class="nhsuk-footer__meta">
          <p class="nhsuk-body-s">&copy; Design Tracking</p>
        </div>
      </div>
    </footer>

    <script src="shared.js"></script>
    <script>initNav('statuses');</script>
    <script type="module">
      import { initAll } from 'https://cdn.jsdelivr.net/npm/nhsuk-frontend@10.5.2/dist/nhsuk/nhsuk-frontend.min.js';
      initAll();
    </script>
    <script>
      let data = loadData();
      let dragSrc = null;

      const COLOUR_BG = {
        grey: '#768692', blue: '#005eb8', green: '#007f3b', yellow: '#ffb81c',
        red: '#d5281b', purple: '#4c2c92', 'aqua-green': '#00826e', pink: '#ae2573',
        orange: '#f47738', white: '#ffffff',
      };

      function populate() {
        // Colour select
        document.getElementById('f-colour').innerHTML = NHS_TAG_COLOURS.map(c =>
          `<option value="${c.value}">${c.label}</option>`
        ).join('');

        // Status list
        const ul = document.getElementById('status-list');
        ul.innerHTML = data.statuses.map((s, idx) => `
          <li class="status-row" data-id="${s.id}" data-idx="${idx}"
              draggable="true"
              ondragstart="onDragStart(event,${s.id})"
              ondragend="onDragEnd(event)"
              ondragover="onDragOver(event)"
              ondragleave="onDragLeave(event)"
              ondrop="onDrop(event,${s.id})">
            <span class="drag-handle">⠿</span>
            <strong class="nhsuk-tag nhsuk-tag--${esc(s.colour)}">${esc(s.name)}</strong>
            <div class="status-actions">
              <button class="nhsuk-button nhsuk-button--secondary nhsuk-button--small" style="margin:0"
                      onclick="editStatus(${s.id})">Edit</button>
            </div>
          </li>`).join('');
      }

      function editStatus(id) {
        const s = data.statuses.find(s => s.id === id);
        if (!s) return;
        document.getElementById('f-id').value     = s.id;
        document.getElementById('f-name').value   = s.name;
        document.getElementById('f-colour').value = s.colour;
        document.getElementById('form-heading').textContent = `Edit: ${s.name}`;
        document.getElementById('delete-btn').style.display = 'inline-block';
        const exp = document.getElementById('status-expander');
        exp.open = true;
        exp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        document.getElementById('f-name').focus();
      }

      function cancelEdit() {
        document.getElementById('status-form').reset();
        document.getElementById('f-id').value = '';
        document.getElementById('form-heading').textContent = 'Add status';
        document.getElementById('delete-btn').style.display = 'none';
        document.getElementById('status-expander').open = false;
      }

      document.getElementById('status-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const rawId  = document.getElementById('f-id').value;
        const name   = document.getElementById('f-name').value.trim();
        const colour = document.getElementById('f-colour').value;
        if (!name) { alert('Name is required.'); document.getElementById('f-name').focus(); return; }
        if (rawId) {
          const s = data.statuses.find(s => s.id === parseInt(rawId));
          if (s) { s.name = name; s.colour = colour; }
        } else {
          data.statuses.push({ id: data.nextStatusId++, name, colour });
        }
        saveData(data);
        cancelEdit();
        populate();
      });

      function deleteStatus() {
        const id   = parseInt(document.getElementById('f-id').value);
        const name = document.getElementById('f-name').value || 'this status';
        if (!id) return;
        if (!confirm(`Delete status "${name}"? Items using this status will show as unknown.`)) return;
        data.statuses = data.statuses.filter(s => s.id !== id);
        saveData(data);
        cancelEdit();
        populate();
      }

      /* ── Drag to reorder ──────────────────────────────────── */

      function onDragStart(e, id) {
        dragSrc = id;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
      }
      function onDragEnd(e) {
        e.currentTarget.classList.remove('dragging');
        document.querySelectorAll('.status-row.drag-over').forEach(el => el.classList.remove('drag-over'));
        dragSrc = null;
      }
      function onDragOver(e) {
        e.preventDefault();
        e.currentTarget.classList.add('drag-over');
      }
      function onDragLeave(e) {
        e.currentTarget.classList.remove('drag-over');
      }
      function onDrop(e, targetId) {
        e.preventDefault();
        if (dragSrc === null || dragSrc === targetId) return;
        const srcIdx = data.statuses.findIndex(s => s.id === dragSrc);
        const tgtIdx = data.statuses.findIndex(s => s.id === targetId);
        const [moved] = data.statuses.splice(srcIdx, 1);
        data.statuses.splice(tgtIdx, 0, moved);
        saveData(data);
        populate();
      }

      populate();
    </script>
  </body>
</html>
